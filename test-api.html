<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API - Sistema de Votaciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-4xl font-bold text-gray-900 mb-8">Prueba de API REST</h1>
        
        <div class="grid md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-2xl font-bold text-gray-900 mb-4">Endpoints Disponibles</h2>
                <div class="space-y-3">
                    <button onclick="getAllCandidatos()" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition">
                        GET /api/candidatos
                    </button>
                    <button onclick="getRanking()" class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition">
                        GET /api/candidatos/ranking/votos
                    </button>
                    <div class="flex gap-2">
                        <input type="number" id="candidatoId" placeholder="ID del candidato" 
                               class="flex-1 px-4 py-3 border border-gray-300 rounded-lg">
                        <button onclick="getCandidatoById()" class="bg-purple-600 text-white px-6 py-3 rounded-lg hover:bg-purple-700 transition">
                            Buscar por ID
                        </button>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="partidoNombre" placeholder="Nombre del partido" 
                               class="flex-1 px-4 py-3 border border-gray-300 rounded-lg">
                        <button onclick="getCandidatosByPartido()" class="bg-orange-600 text-white px-6 py-3 rounded-lg hover:bg-orange-700 transition">
                            Buscar por Partido
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-2xl font-bold text-gray-900 mb-4">Estado de la API</h2>
                <div id="apiStatus" class="text-gray-600">
                    <p>Esperando solicitud...</p>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h2 class="text-2xl font-bold text-gray-900 mb-4">Respuesta de la API</h2>
            <pre id="apiResponse" class="bg-gray-900 text-green-400 p-4 rounded-lg overflow-auto max-h-96 text-sm">
{
  "message": "Haz clic en algún botón para probar la API"
}
            </pre>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';

        function updateStatus(status, type = 'info') {
            const statusDiv = document.getElementById('apiStatus');
            const colors = {
                info: 'text-blue-600',
                success: 'text-green-600',
                error: 'text-red-600',
                loading: 'text-yellow-600'
            };
            statusDiv.innerHTML = `<p class="${colors[type]} font-semibold">${status}</p>`;
        }

        function updateResponse(data) {
            document.getElementById('apiResponse').textContent = JSON.stringify(data, null, 2);
        }

        async function getAllCandidatos() {
            try {
                updateStatus('Cargando todos los candidatos...', 'loading');
                const response = await fetch(`${API_URL}/api/candidatos`);
                const data = await response.json();
                updateResponse(data);
                updateStatus(`✓ ${data.total} candidatos obtenidos`, 'success');
            } catch (error) {
                updateStatus(`✗ Error: ${error.message}`, 'error');
                updateResponse({ error: error.message });
            }
        }

        async function getCandidatoById() {
            const id = document.getElementById('candidatoId').value;
            if (!id) {
                alert('Por favor ingresa un ID');
                return;
            }
            
            try {
                updateStatus(`Buscando candidato con ID ${id}...`, 'loading');
                const response = await fetch(`${API_URL}/api/candidatos/${id}`);
                const data = await response.json();
                updateResponse(data);
                
                if (response.ok) {
                    updateStatus(`✓ Candidato encontrado`, 'success');
                } else {
                    updateStatus(`✗ ${data.message}`, 'error');
                }
            } catch (error) {
                updateStatus(`✗ Error: ${error.message}`, 'error');
                updateResponse({ error: error.message });
            }
        }

        async function getRanking() {
            try {
                updateStatus('Obteniendo ranking por votos...', 'loading');
                const response = await fetch(`${API_URL}/api/candidatos/ranking/votos`);
                const data = await response.json();
                updateResponse(data);
                updateStatus(`✓ Ranking obtenido (${data.total} candidatos)`, 'success');
            } catch (error) {
                updateStatus(`✗ Error: ${error.message}`, 'error');
                updateResponse({ error: error.message });
            }
        }

        async function getCandidatosByPartido() {
            const partido = document.getElementById('partidoNombre').value;
            if (!partido) {
                alert('Por favor ingresa un nombre de partido');
                return;
            }
            
            try {
                updateStatus(`Buscando candidatos del partido "${partido}"...`, 'loading');
                const response = await fetch(`${API_URL}/api/candidatos/partido/${encodeURIComponent(partido)}`);
                const data = await response.json();
                updateResponse(data);
                updateStatus(`✓ ${data.total} candidatos encontrados`, 'success');
            } catch (error) {
                updateStatus(`✗ Error: ${error.message}`, 'error');
                updateResponse({ error: error.message });
            }
        }
    </script>
</body>
</html>
