<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="../index.html" class="text-2xl font-bold text-indigo-600">Sistema de Votaciones</a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="registro.html" class="text-gray-700 hover:text-indigo-600 px-3 py-2">Registro</a>
                    <a href="votacion.html" class="text-gray-700 hover:text-indigo-600 px-3 py-2">Votar</a>
                    <a href="resultados.html" class="text-indigo-600 font-semibold px-3 py-2">Resultados</a>
                    <a href="sincronizar.html" class="text-gray-700 hover:text-indigo-600 px-3 py-2">Sincronizar</a>
                    <a href="admin.html" class="text-gray-700 hover:text-indigo-600 px-3 py-2">Admin</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <h2 class="text-4xl font-bold text-gray-900 mb-8 text-center">Resultados en Tiempo Real</h2>
        
        <div class="bg-white rounded-lg shadow-xl p-8 mb-8">
            <div class="grid md:grid-cols-2 gap-8">
                <div>
                    <h3 class="text-2xl font-bold text-gray-900 mb-4">Gráfica de Votos</h3>
                    <canvas id="chartVotos"></canvas>
                </div>
                <div>
                    <h3 class="text-2xl font-bold text-gray-900 mb-4">Estadísticas</h3>
                    <div id="estadisticas" class="space-y-4"></div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-xl p-8">
            <h3 class="text-2xl font-bold text-gray-900 mb-6">Detalle por Candidato</h3>
            <div id="detalleResultados" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </main>

    <script src="../js/resultados.js"></script>
</body>
</html>
