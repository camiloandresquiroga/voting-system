<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="../index.html" class="text-2xl font-bold text-indigo-600">Sistema de Votaciones</a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="registro.html" class="text-gray-700 hover:text-indigo-600 px-3 py-2">Registro</a>
                    <a href="votacion.html" class="text-gray-700 hover:text-indigo-600 px-3 py-2">Votar</a>
                    <a href="resultados.html" class="text-gray-700 hover:text-indigo-600 px-3 py-2">Resultados</a>
                    <a href="sincronizar.html" class="text-gray-700 hover:text-indigo-600 px-3 py-2">Sincronizar</a>
                    <a href="admin.html" class="text-indigo-600 font-semibold px-3 py-2">Admin</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-12">
        <div id="loginSection" class="bg-white rounded-lg shadow-xl p-8 max-w-md mx-auto">
            <h2 class="text-3xl font-bold text-gray-900 mb-6 text-center">Acceso Administrativo</h2>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Usuario</label>
                    <input type="text" id="username" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
                    <input type="password" id="password" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                </div>
                <button type="submit" 
                        class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition">
                    Ingresar
                </button>
            </form>
            <div id="mensajeLogin" class="mt-4 hidden"></div>
        </div>

        <div id="adminPanel" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-bold text-gray-900">Panel de Administración</h2>
                <button id="logoutBtn" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">Cerrar Sesión</button>
            </div>

            <div class="bg-white rounded-lg shadow-xl p-8 mb-8">
                <h3 class="text-2xl font-bold text-gray-900 mb-6">Registrar Candidato</h3>
                <form id="candidatoForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Nombre del Candidato</label>
                        <input type="text" id="nombreCandidato" required 
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Partido/Bando</label>
                        <input type="text" id="partido" required 
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">URL de la Foto</label>
                        <input type="text" id="foto" required 
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                               placeholder="https://ejemplo.com/foto.jpg">
                    </div>
                    <button type="submit" 
                            class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition">
                        Registrar Candidato
                    </button>
                </form>
                <div id="mensajeCandidato" class="mt-4 hidden"></div>
            </div>

            <div class="bg-white rounded-lg shadow-xl p-8">
                <h3 class="text-2xl font-bold text-gray-900 mb-6">Candidatos Registrados</h3>
                <div id="listaCandidatosAdmin" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <script src="../js/admin.js"></script>
</body>
</html>
