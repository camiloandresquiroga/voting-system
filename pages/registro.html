<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Votantes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="../index.html" class="text-2xl font-bold text-indigo-600">Sistema de Votaciones</a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="registro.html" class="text-indigo-600 font-semibold px-3 py-2">Registro</a>
                    <a href="votacion.html" class="text-gray-700 hover:text-indigo-600 px-3 py-2">Votar</a>
                    <a href="resultados.html" class="text-gray-700 hover:text-indigo-600 px-3 py-2">Resultados</a>
                    <a href="sincronizar.html" class="text-gray-700 hover:text-indigo-600 px-3 py-2">Sincronizar</a>
                    <a href="admin.html" class="text-gray-700 hover:text-indigo-600 px-3 py-2">Admin</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-4 py-12">
        <div class="bg-white rounded-lg shadow-xl p-8">
            <h2 class="text-3xl font-bold text-gray-900 mb-6 text-center">Registro de Votantes</h2>
            
            <form id="registroForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Número de Cédula</label>
                    <input type="text" id="cedula" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                           placeholder="Ej: 1234567890">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Nombre Completo</label>
                    <input type="text" id="nombre" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                           placeholder="Ej: Juan Pérez">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Correo Electrónico</label>
                    <input type="email" id="email" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                           placeholder="Ej: juan@email.com">
                </div>
                
                <button type="submit" 
                        class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition">
                    Registrarse
                </button>
            </form>
            
            <div id="mensaje" class="mt-6 hidden"></div>
        </div>
    </main>

    <script src="../js/registro.js"></script>
</body>
</html>
